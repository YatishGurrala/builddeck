name: CI

on:
  push:
    branches:
      - dev
      - main
      - pro

jobs:
  quality:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect tech stack
        id: detect
        shell: bash
        run: |
          if [[ -f package.json ]]; then
            echo "has_node=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_node=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -f requirements.txt || -f pyproject.toml ]]; then
            echo "has_python=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_python=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.detect.outputs.has_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Node dependencies
        if: steps.detect.outputs.has_node == 'true'
        run: npm ci

      - name: Run Node checks
        if: steps.detect.outputs.has_node == 'true'
        run: |
          npm run lint --if-present
          npm test --if-present
          npm run build --if-present

      - name: Set up Python
        if: steps.detect.outputs.has_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        if: steps.detect.outputs.has_python == 'true'
        run: |
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then pip install -r requirements.txt; fi
          if [[ -f pyproject.toml ]]; then pip install .; fi

      - name: Run Python tests
        if: steps.detect.outputs.has_python == 'true'
        run: |
          if command -v pytest >/dev/null 2>&1; then
            pytest -q
          else
            echo "pytest not installed yet; skipping Python tests."
          fi

      - name: Fallback when project files are not ready
        if: steps.detect.outputs.has_node == 'false' && steps.detect.outputs.has_python == 'false'
        run: echo "No Node/Python project files found yet. CI scaffold is ready."
